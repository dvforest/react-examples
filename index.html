<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Examples</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f9fafb;
      }

      main {
        width: min(680px, calc(100% - 2rem));
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(17, 24, 39, 0.9);
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0.75rem;
      }

      p {
        line-height: 1.6;
        color: #d1d5db;
      }

      ul {
        padding-left: 1.25rem;
      }

      li + li {
        margin-top: 0.5rem;
      }

      a {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>React Examples</h1>
      <p>Open one of the example directories below to view a demo.</p>
      <ul>
        <li><a href="/boilerplate/">Boilerplate</a></li>
        <li><a href="/class-components/">Class components</a></li>
        <li><a href="/fetching-data/">Fetching data</a></li>
        <li><a href="/memoization/">Memoization</a></li>
        <li><a href="/state/">State</a></li>
      </ul>
    </main>
  </body>
</html>
